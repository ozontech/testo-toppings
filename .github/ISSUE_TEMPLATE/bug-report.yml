---
name: Bug Report
description: File a bug report.
labels: ["bug"]
type: bug
assignees:
  - metafates
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
    validations:
      required: true

  - type: textarea
    id: code
    attributes:
      label: Relevant code sample
      description: |
        Please copy and paste any relevant source code output.
        Will be automatically formatted into Go code, no need for backticks.
      render: go

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: |
        Please copy and paste any relevant log output.
        Will be automatically formatted into code, no need for backticks.
      render: shell
